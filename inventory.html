<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Refreshments - Inventory Tracker</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 650px;
            margin: auto;
        }
        .logo {
            max-width: 180px;
            margin-bottom: 15px;
        }
        h1 {
            color: #d32f2f;
            margin-bottom: 25px;
            font-size: 28px;
        }
        label {
            display: block;
            margin: 18px 0 6px;
            font-weight: bold;
            text-align: left;
            color: #333;
        }
        select, input[type="number"], input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background-color: #d32f2f;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #b71c1c;
        }
        #status {
            margin: 20px 0;
            font-weight: bold;
            min-height: 24px;
        }
        .success { color: #2e7d32; }
        .error { color: #d32f2f; }

        .inventory-section {
            margin-top: 40px;
            text-align: left;
        }
        .date-header {
            background: #f0f0f0;
            padding: 12px 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #d32f2f;
            cursor: pointer;
            border-left: 5px solid #d32f2f;
        }
        .entry {
            background: #fafafa;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #d32f2f;
        }
        .back-link {
            display: block;
            margin-top: 40px;
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo1-1.jpg" alt="MD Refreshments Logo" class="logo">
    <h1>Inventory Tracker</h1>

    <form id="restockForm">
        <label for="location">Location</label>
        <select id="location" required>
            <option value="">Select Location</option>
            <option value="G2 Warehouse">G2 Warehouse</option>
            <option value="G4 Warehouse">G4 Warehouse</option>
        </select>

        <label for="machine">Machine</label>
        <select id="machine" required>
            <option value="">Select Machine</option>
        </select>

        <label for="product">Product 
            <small>(G2 Soda = 16.9 fl oz bottles, G4 Soda = cans)</small>
        </label>
        <select id="product" required>
            <option value="">Select Product</option>
        </select>

        <label for="amountAdded">Amount Added</label>
        <input type="number" id="amountAdded" min="1" required placeholder="e.g. 24">

        <label for="whoRestocked">Who Restocked</label>
        <input type="text" id="whoRestocked" required placeholder="e.g. Marcus">

        <label for="notes">Notes / Reason (optional)</label>
        <textarea id="notes" rows="3" placeholder="e.g. Low stock alert"></textarea>

        <button type="submit">Log Restock</button>
    </form>

    <p id="status"></p>

    <div class="inventory-section">
        <button onclick="toggleRestockList()" style="background-color: #0073bb; width: auto; margin-bottom: 15px;">
            Restock List
        </button>
        <div id="restockListContainer" style="display: none;">
            <h3>Recent Restocks</h3>
            <div id="inventoryList"></div>
        </div>
    </div>

    <a href="/" class="back-link">← Back to Upload Page</a>
</div>

<script>
const form = document.getElementById("restockForm");
const statusEl = document.getElementById("status");
const inventoryList = document.getElementById("inventoryList");
const restockListContainer = document.getElementById("restockListContainer");

const locationSelect = document.getElementById("location");
const machineSelect = document.getElementById("machine");
const productSelect = document.getElementById("product");

const inventoryData = {
    "G2 Warehouse": {
        machines: {
            "G2 Soda": ["Ginger Ale", "Brisk Tea", "Pepsi", "Mountain Dew", "Dr Pepper"],
            "G2 Snack": ["Doritos Nacho Cheese", "Doritos Cool Ranch", "Lays BBQ Chips", "Lays Regular Chips", "Pop Tarts Blueberry", "Pop Tarts Cherry", "Pop Tarts Strawberry", "Cheetos Puffs", "Cheetos", "Ruffles Cheddar & Sour Cream", "Jumbo Honey Buns Glazed", "Jumbo Honey Buns Iced", "Peanut M&M's King Size", "King Size Snickers", "Lance Crackers", "Skittles", "Sour Skittles"]
        }
    },
    "G4 Warehouse": {
        machines: {
            "G4 Soda": ["Sprite", "Coke", "Orange Fanta", "Strawberry Fanta", "Ginger Ale", "Dr Pepper", "Mountain Dew"],
            "G4 Snack": ["Doritos Nacho Cheese", "Doritos Cool Ranch", "Lays BBQ Chips", "Lays Regular Chips", "Pop Tarts Blueberry", "Pop Tarts Cherry", "Pop Tarts Strawberry", "Cheetos Puffs", "Cheetos", "Ruffles Cheddar & Sour Cream", "Jumbo Honey Buns Glazed", "Jumbo Honey Buns Iced", "Peanut M&M's King Size", "King Size Snickers", "Lance Crackers", "Skittles", "Sour Skittles"]
        }
    }
};

locationSelect.addEventListener("change", () => {
    const loc = locationSelect.value;
    machineSelect.innerHTML = '<option value="">Select Machine</option>';
    productSelect.innerHTML = '<option value="">Select Product</option>';

    if (loc && inventoryData[loc]) {
        Object.keys(inventoryData[loc].machines).forEach(m => {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m;
            machineSelect.appendChild(opt);
        });
    }
});

machineSelect.addEventListener("change", () => {
    const loc = locationSelect.value;
    const mach = machineSelect.value;
    productSelect.innerHTML = '<option value="">Select Product</option>';

    if (loc && mach && inventoryData[loc].machines[mach]) {
        inventoryData[loc].machines[mach].forEach(p => {
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            productSelect.appendChild(opt);
        });
    }
});

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.textContent = "";
    statusEl.className = "";

    const data = {
        location: locationSelect.value,
        machine: machineSelect.value,
        product: productSelect.value,
        amountAdded: parseInt(document.getElementById("amountAdded").value),
        whoRestocked: document.getElementById("whoRestocked").value,
        notes: document.getElementById("notes").value
    };

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                data.latitude = pos.coords.latitude;
                data.longitude = pos.coords.longitude;
                submitRestock(data);
            },
            () => submitRestock(data)
        );
    } else {
        submitRestock(data);
    }
});

async function submitRestock(data) {
    try {
        const response = await fetch("https://cc4x8ok8s8.execute-api.us-east-1.amazonaws.com/dev/add-restock", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (!response.ok) throw new Error("Failed to log restock");

        statusEl.textContent = "Restock logged successfully!";
        statusEl.className = "success";
        form.reset();
        loadInventory();

    } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "error";
    }
}

function toggleRestockList() {
    if (restockListContainer.style.display === "none") {
        restockListContainer.style.display = "block";
        loadInventory();
    } else {
        restockListContainer.style.display = "none";
    }
}

async function loadInventory() {
    try {
        const response = await fetch("https://cc4x8ok8s8.execute-api.us-east-1.amazonaws.com/dev/inventory", { method: "GET" });
        if (!response.ok) throw new Error("Failed to load inventory");

        const entries = await response.json();

        const groupedByDate = {};
        entries.forEach(entry => {
            const dateKey = new Date(entry.restockedAt).toISOString().split('T')[0];
            if (!groupedByDate[dateKey]) groupedByDate[dateKey] = [];
            groupedByDate[dateKey].push(entry);
        });

        let html = '';

        Object.keys(groupedByDate)
            .sort((a, b) => new Date(b) - new Date(a))
            .forEach(dateKey => {
                const dateObj = new Date(dateKey);
                const formattedDate = dateObj.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

                html += `
                    <details style="margin-bottom: 20px;">
                        <summary style="font-size: 18px; font-weight: bold; color: #d32f2f; cursor: pointer; padding: 10px; background: #f0f0f0; border-radius: 8px;">
                            ${formattedDate} (${groupedByDate[dateKey].length} entries)
                        </summary>`;

                groupedByDate[dateKey].forEach(entry => {
                    html += `
                        <div class="entry">
                            <strong>${entry.location} - ${entry.machine} - ${entry.product}</strong><br>
                            Added: ${entry.amountAdded} on ${new Date(entry.restockedAt).toLocaleTimeString()}<br>
                            By: ${entry.whoRestocked}
                            ${entry.notes ? `<br>Notes: ${entry.notes}` : ''}
                            ${entry.latitude ? `<br>GPS: ${entry.latitude.toFixed(4)}, ${entry.longitude.toFixed(4)}` : ''}
                        </div>`;
                });

                html += `</details>`;
            });

        inventoryList.innerHTML = html || "<p>No restocks logged yet.</p>";

    } catch (err) {
        inventoryList.innerHTML = "<p>Error loading inventory: " + err.message + "</p>";
    }
}

// Initial load is hidden until button is clicked
</script>

</body>
</html>
